# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Forge E2E Pipeline: Build Genuinely Good iOS Apps"
  slug: "forge-e2e-pipeline-great-apps"
  kind: specific
  tranche: "continuous execution: make Forge's reusable pipeline deliver one genuinely good generated iOS app end-to-end"
  status: complete
  oracle:
    signal: "Forge pipeline stages/gates for product, competitive context, onboarding/activation, retention, monetization, UX states, design, native build, verification, judge/repair, and App Store handoff are created/improved/validated, then exercised to generate one 80%-ship-ready iOS proof app outside the template."
    cadence: "after each Scout/Judge/Worker package and final audit"
    final_proof: "Final Judge records full_outcome_complete: true and maps reusable Forge pipeline changes/instructions plus generated app evidence: .forge artifacts, native SwiftUI flows, Xcode build/run, screenshots/UI snapshots, product/design/retention/monetization judgments, repair loop, App Store handoff, template preservation, marketplace v5 alignment, and local commit hashes."
  intake:
    original_request: "Scrap the patched old goal and create a fresh GoalBuddy goal. Core: make the Forge pipeline great and make it deliver a good iOS app E2E."
    interpreted_outcome: "Forge itself becomes a stronger reusable iOS app factory, proven by one generated app that is plausibly worth Matvii polishing for App Store."
    input_shape: specific
    audience: "Matvii"
    authority: requested
    proof_type: demo
    completion_proof: "Reusable Forge stages/gates are improved or validated and used to generate a separate app with product, UX, retention, monetization, design, native build/run/screenshot evidence, repair receipts, and App Store handoff."
    likely_misfire: "Hand-building DayRate Lab, patching the superseded goal, mutating the Forge template, or treating static docs/build success as proof that Forge is good."
    blind_spots_considered:
      - "Forge is Matvii's personal app factory; the proof app is evidence, not the deliverable."
      - "The old patched goal was scrapped because patching changed the premise."
      - "Previous local proof commits contaminated the template and should not be continued as architecture."
      - "Remote forge-marketplace v5 may be ahead of local and encodes a more pipeline-first architecture."
      - "Good apps require product usefulness, onboarding activation, retention, monetization, user flows, design, native implementation, verification, and handoff."
      - "A one-off script is acceptable only as bridge evidence if it folds back into reusable Forge capability."
    existing_plan_facts:
      - "Primary repo: /Users/matvii/Developer/Personal/forge, remote git@github.com:sakhnenkoff/forge-ios.git."
      - "Marketplace repo: /Users/matvii/Developer/Personal/forge-marketplace, remote git@github.com:sakhnenkoff/forge-marketplace.git."
      - "Remote marketplace v5 direction: thin forge-app launcher, project-local phase skills, no direct Swift writes by orchestrator, app-agnostic P0-P7 phases."
      - "Vault intent: Forge is a personal app factory; products are apps Forge builds; goal is 80% rocket launcher -> Matvii polish -> App Store."
      - "Old local proof commits a6eadee/55efa93/f9fb5e4/0d70b5d are archived at branch forge-complete-proof-archive and should not be pushed as-is."
      - "Superseded board: docs/goals/forge-app-factory-real-app-proof; do not continue it."
      - "Correct Xcode env: DEVELOPER_DIR=/Applications/Xcode-26.5.0.app/Contents/Developer."
      - "Default benchmark app: DayRate Lab unless Judge records stronger proof app rationale."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: not_started
    url: null
    command: "npx goalbuddy board docs/goals/forge-e2e-pipeline-great-apps"

