<!doctype html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Trail Prototype</title><style>body{font-family:-apple-system;background:#F2F0E8;color:#26324A}.rail{border-left:4px solid #26324A;padding:24px;margin:24px}.note{margin-left:18px;background:#fff8;padding:12px;border-radius:14px}</style></head><body>
<main class="rail" data-screen="activation"><h1>Light the next step</h1><p>Add one signal from today. The trail will choose one safe commitment.</p><button onclick="document.querySelector('main').dataset.screen='core';document.querySelector('#state').textContent='Commit: ask the client for one missing constraint';">Pin signal</button><section class="note" id="state">Empty trail: one signal starts the path.</section><button onclick="document.querySelector('main').dataset.screen='locked';document.querySelector('#state').textContent='Advanced branch locked: compare three plans after one more signal.';">Preview locked branch</button></main>
</body></html>
